name: Release

# Changesets-driven release flow (replaces the old v*-tag publish job).
#
# How it works:
#   1. A PR that ships a user-visible change includes a changeset: run
#      `bun run changeset` locally and commit the generated
#      `.changeset/*.md` (it records which packages bump and how).
#   2. PR is reviewed and merged into main.
#   3. This workflow runs. If pending changesets exist, changesets/action
#      opens (or updates) a "chore: version packages" PR that applies the
#      bumps, regenerates each affected package's CHANGELOG.md, and removes
#      the consumed `.changeset/*.md` files.
#   4. When that "version packages" PR is merged, this workflow runs again
#      with no pending changesets, so the action runs `bun run release`
#      (`changeset publish`), publishing the newly-bumped packages to npm
#      and cutting a GitHub Release per package version.
#
# Authentication is npm OIDC trusted publishing — NO NPM_TOKEN secret.
# changesets/action detects OIDC automatically (it sees `id-token: write`)
# and lets `npm publish` do the trusted-publishing handshake. Each
# package's npmjs.com/package/<name>/access page must have a Trusted
# Publisher entry pointing at this repo + workflow `release.yml` +
# environment `npm-publish`.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      # changesets/action needs these to open the version-packages PR and
      # create GitHub Releases.
      contents: write
      pull-requests: write
      # Required for npm OIDC trusted publishing + provenance attestation.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # changesets needs full history to compute what changed.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2
        with:
          bun-version: latest

      - name: Setup Node (without registry-url — OIDC requires that)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          # Do NOT set registry-url. setup-node would write ~/.npmrc with
          # `_authToken=${NODE_AUTH_TOKEN}` and export a placeholder
          # NODE_AUTH_TOKEN; npm then treats the placeholder as a real
          # token, skips OIDC trusted publishing, and 404s.

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        # Node 22 ships npm 10.x. Trusted publishing needs npm >= 11.5.1.
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install workspace
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Create version-packages PR or publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          # Opens/updates the "chore: version packages" PR (applies bumps +
          # regenerates CHANGELOGs).
          version: bun run version-packages
          # Runs once that PR is merged (no pending changesets): publishes
          # the bumped packages via `changeset publish`.
          publish: bun run release
          createGithubReleases: true
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: with id-token:write the action uses OIDC trusted
          # publishing. Provenance attaches a signed SLSA attestation.
          NPM_CONFIG_PROVENANCE: "true"
