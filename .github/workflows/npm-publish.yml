name: Release

# Changesets-driven release flow.
#
# This file is named `npm-publish.yml` ON PURPOSE: npm OIDC trusted
# publishing pins the *workflow filename*, and every @open-rgs/* package's
# Trusted Publisher entry already points at `npm-publish.yml` (that's how
# the 0.x versions were published). Renaming the file would break OIDC
# until each package's Trusted Publisher was updated on npmjs.com — so the
# changesets flow lives here, under the original name. Identity that must
# match the Trusted Publisher: repo + this filename + environment
# `npm-publish`.
#
# How it works:
#   1. A PR that ships a user-visible change includes a changeset
#      (`bun run changeset`, commit the generated `.changeset/*.md`).
#   2. On merge to main, if pending changesets exist, changesets/action
#      opens/updates a "chore: version packages" PR (applies bumps +
#      regenerates CHANGELOGs).
#   3. Merging that PR triggers this workflow again with no pending
#      changesets, so it runs `changeset publish` → npm (OIDC + provenance)
#      + a GitHub Release per package.
#
# Run it manually with the `snapshot` input to TEST the publish path: it
# publishes throwaway `0.0.0-snapshot-*` versions under the `snapshot`
# dist-tag via the real OIDC handshake, without touching `latest` or any
# real version.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Publish a throwaway snapshot release to test the OIDC publish path (does not touch latest / real versions)"
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      # changesets/action needs these to open the version-packages PR and
      # create GitHub Releases.
      contents: write
      pull-requests: write
      # Required for npm OIDC trusted publishing + provenance attestation.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2
        with:
          bun-version: latest

      - name: Setup Node (without registry-url — OIDC requires that)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          # Do NOT set registry-url. setup-node would write ~/.npmrc with
          # `_authToken=${NODE_AUTH_TOKEN}`; npm then treats the placeholder
          # as a real token, skips OIDC trusted publishing, and 404s.

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install workspace
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      # --- Test path: throwaway snapshot publish (manual trigger only) ---
      - name: Publish snapshot (test the OIDC path)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot }}
        run: bun run snapshot
        env:
          # `changeset version` runs the changelog-github generator, which
          # calls the GitHub API — it needs a token even for snapshots.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OIDC handles npm auth; provenance attaches the SLSA attestation.
          NPM_CONFIG_PROVENANCE: "true"

      # --- Normal path: open the version PR, or publish on its merge ---
      - name: Create version-packages PR or publish
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.snapshot) }}
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: bun run version-packages
          publish: bun run release
          createGithubReleases: true
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: with id-token:write the action uses OIDC trusted
          # publishing. Provenance attaches a signed SLSA attestation.
          NPM_CONFIG_PROVENANCE: "true"
