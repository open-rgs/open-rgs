# Reference K8s Deployment + Service for an open-rgs game server.
#
# Replace <game-id>, <registry>, <sha>, and the wallet/admin env vars.
# The image is built via deploy/docker/Dockerfile from your game repo.
#
# Single-port: client WS, k8s probes, and (token-gated) admin all share
# port 8080. The process runs as non-root, so the port is non-privileged.
# To isolate admin on a private port, set it in your wiring and add a second
# containerPort + a NetworkPolicy that only allows operators to reach it.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rgs-<game-id>
  labels:
    app: rgs-<game-id>
spec:
  replicas: 3                       # stateless  - scale freely
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: rgs-<game-id>
  template:
    metadata:
      labels:
        app: rgs-<game-id>
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000             # the oven/bun image's `bun` user
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rgs
          image: <registry>/rgs-<game-id>:<sha>
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - { name: ws, containerPort: 8080 }
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "8080" }
            # Admin (/admin/* + detailed /healthz) fails closed in production
            # without this token.
            - name: OPEN_RGS_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rgs-<game-id>-secrets
                  key: admin-token
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: rgs-<game-id>-secrets
                  key: api-key
            - name: PLATFORM_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: rgs-<game-id>-config
                  key: platform-ws-url
          # /livez is process-up only  - never restart the pod for wallet flapping.
          livenessProbe:
            httpGet: { path: /livez, port: ws }
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          # /readyz reflects wallet connectivity (200 healthy / 503 down) and
          # is unauthenticated  - pull the pod from rotation when the wallet is
          # down, without restarting it. (Use /readyz, not /healthz: the
          # detailed /healthz requires the admin token and would 403 the probe.)
          readinessProbe:
            httpGet: { path: /readyz, port: ws }
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          # Let the load balancer deregister this pod before SIGTERM so no new
          # connections arrive mid-drain. The graceful drain (default 30s) then
          # runs with headroom under terminationGracePeriodSeconds.
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 256Mi
      terminationGracePeriodSeconds: 45
---
apiVersion: v1
kind: Service
metadata:
  name: rgs-<game-id>
spec:
  selector:
    app: rgs-<game-id>
  ports:
    - { name: ws, port: 80, targetPort: ws }
